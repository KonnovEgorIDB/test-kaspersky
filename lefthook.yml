pre-commit:
  commands:
    lint-and-format-js:
      glob: '*.{js,jsx}'
      run: npm run lint:fix && npm run format && git add {staged_files}

    lint-css:
      glob: '*.css'
      run: npm run lint:css && git add {staged_files}

    format-other:
      glob: '*.{html,json}'
      run: npm run format && git add {staged_files}